name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  qa:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: write
    strategy:
      matrix:
        python-version: ["3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          uv sync --all-groups
          uv pip install -e .

      - name: Run type checking
        run: |
          uv run ty check

      - name: Run linting
        run: |
          uv run ruff check

      - name: Run format check
        run: |
          uv run ruff format --check

      - name: Run tests with coverage
        run: |
          uv run pytest --cov=gardena_smart_local_api --cov-report=term --cov-report=xml

      - name: Coverage comment
        if: github.event_name == 'pull_request' && matrix.python-version == '3.12'
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ github.token }}

  package:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Build wheel
        run: uv build --wheel

      - name: Install wheel and test dependencies
        run: |
          UV_PROJECT_ENVIRONMENT=$RUNNER_TEMP/.venv uv sync --group test --no-install-project
          uv pip install --python $RUNNER_TEMP/.venv dist/*.whl

      - name: Run tests against installed package
        working-directory: ${{ runner.temp }}
        run: uv run pytest $GITHUB_WORKSPACE/tests/ --import-mode=importlib

  ha-compat:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Check installability with latest Home Assistant
        run: uv venv && uv pip install "homeassistant>=2024.12.0" . && uv pip check

  gitlint:
    runs-on: ubuntu-24.04
    steps:
      - name: Check commit messages & PR
        uses: aschbacd/gitlint-action@v1.2.0
        with:
          commit-message-subject-max-length: 72
