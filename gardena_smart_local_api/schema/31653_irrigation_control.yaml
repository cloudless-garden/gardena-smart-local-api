name: Irrigation Control
protocol: gen1
commands:
  measure_rf_link: 7
  close_all_valves: 22
  emc_test_start: 29
  emc_test_stop: 30
  reboot: 31
  ntp_force_sync: 32
  led_all_off: 33
  led_all_green_on: 34
  led_all_red_on: 35
  reset_all_valve_errors: 36
  hap_identify: 37
  test_watchdog: 38
  test_hard_fault: 39
objects:
  connection_status:
    resources:
      online:
        type: vb
        access: r
        description: Indicates if the device is online (true) or offline (false)
  device:
    resources:
      device_type:
        type: vs
        access: r
        description: Type of the device
      error_code:
        type: ai
        access: r
        description: Current error code(s)
      firmware_version:
        type: vs
        access: r
        description: Current firmware version
      hardware_version:
        type: vs
        access: r
        description: Hardware version
      manufacturer:
        type: vs
        access: r
        description: Manufacturer name
      model_number:
        type: vs
        access: r
        description: Model number or identifier
      serial_number:
        type: vs
        access: r
        description: Serial number
      software_version:
        type: vs
        access: r
        description: Current software version
      supported_binding_and_modes:
        type: vs
        access: r
        description: Supported bindings and modes
      utc_offset:
        type: vs
        access: rw
        description: UTC offset currently in effect for device
  firmware_update:
    resources:
      firmware_update_delivery_method:
        type: vi
        access: r
        description: Firmware update delivery method
      package_uri:
        type: vs
        access: rw
        description: URI from where the device can download the firmware package
      pkg_version:
        type: vs
        access: r
        description: Package version
      state:
        type: vi
        access: r
        min: 0
        max: 3
        description: 'Firmware update state: 0=Idle, 1=Downloading, 2=Downloaded, 3=Updating'
      update_result:
        type: vi
        access: r
        min: 0
        max: 9
        description: 'Update result: 0=Initial, 1=Success, 2=Not enough storage, 3=Out of memory, 4=Connection lost, 5=CRC check failure, 6=Unsupported package type, 7=Invalid URI, 8=Update failed, 9=Unsupported protocol'
  lemonbeat:
    resources:
      action_paused_until_1:
        type: vo
        access: rw
        encoding: hex
        description: 'Timestamp until the schedule is paused for channel 1 (Format: YYYYMMDDHHmm, local time)'
      action_paused_until_2:
        type: vo
        access: rw
        encoding: hex
        description: Timestamp until the schedule is paused for channel 2
      action_paused_until_3:
        type: vo
        access: rw
        encoding: hex
        description: Timestamp until the schedule is paused for channel 3
      action_paused_until_4:
        type: vo
        access: rw
        encoding: hex
        description: Timestamp until the schedule is paused for channel 4
      action_paused_until_5:
        type: vo
        access: rw
        encoding: hex
        description: Timestamp until the schedule is paused for channel 5
      action_paused_until_6:
        type: vo
        access: rw
        encoding: hex
        description: Timestamp until the schedule is paused for channel 6
      be_decision_time:
        type: vi
        access: rw
        unit: s
        min: 1
        max: 3600
        description: Timeout for smart decision from backend (max 1h, default 8 minutes)
      command:
        type: vi
        access: rw
        description: Command to execute
      error:
        type: vi
        access: r
        description: Error status (none, voltage_drop, power_supply, secondary_mcu, eeprom)
      fatal_error_log:
        type: vo
        access: r
        encoding: hex
        description: Fatal error log (error identifier, file, line, stack)
      master_valve_active:
        type: vi
        access: r
        description: Master valve active status (not_active, active)
      rf_link_quality:
        type: vi
        access: r
        unit: '%'
        min: 0
        max: 100
        description: RF link quality percentage
      rf_link_state:
        type: vi
        access: r
        description: RF link state
      schedule_config:
        type: vo
        access: rw
        encoding: hex
        description: Schedule configuration (up to 36 schedules, 7 bytes each)
      schedule_state:
        type: vo
        access: r
        encoding: hex
        description: Schedule state (3 bytes per schedule, 108 bytes total)
      schedule_state_control_shorten:
        type: vo
        access: rw
        encoding: hex
        description: Shorten schedule duration (3 bytes per schedule)
      schedule_state_control_skip:
        type: vo
        access: rw
        encoding: hex
        description: Skip schedule (1 byte per schedule, 36 bytes total)
      stm8_fw_version:
        type: vo
        access: r
        encoding: hex
        description: 'STM8 firmware version (format: XXYYZZDD)'
      valve_error_0:
        type: vi
        access: r
        description: Master valve error status
      valve_error_1:
        type: vi
        access: r
        description: Valve 1 error status (none, exceeded_valves_limit, valve_not_connected, exceeded_current, exceeded_total_current, master_valve, duration_too_short)
      valve_error_2:
        type: vi
        access: r
        description: Valve 2 error status
      valve_error_3:
        type: vi
        access: r
        description: Valve 3 error status
      valve_error_4:
        type: vi
        access: r
        description: Valve 4 error status
      valve_error_5:
        type: vi
        access: r
        description: Valve 5 error status
      valve_error_6:
        type: vi
        access: r
        description: Valve 6 error status
      valve_name_1:
        type: vo
        access: rw
        encoding: hex
        description: Valve 1 name (UTF-8 encoded, 64 bytes)
      valve_name_2:
        type: vo
        access: rw
        encoding: hex
        description: Valve 2 name (UTF-8 encoded, 64 bytes)
      valve_name_3:
        type: vo
        access: rw
        encoding: hex
        description: Valve 3 name (UTF-8 encoded, 64 bytes)
      valve_name_4:
        type: vo
        access: rw
        encoding: hex
        description: Valve 4 name (UTF-8 encoded, 64 bytes)
      valve_name_5:
        type: vo
        access: rw
        encoding: hex
        description: Valve 5 name (UTF-8 encoded, 64 bytes)
      valve_name_6:
        type: vo
        access: rw
        encoding: hex
        description: Valve 6 name (UTF-8 encoded, 64 bytes)
      valves_connected:
        type: vi
        access: r
        min: 0
        max: 127
        description: Connected valves bitfield (Bit_0=master, Bit_n=channel_n)
      valves_master_config:
        type:
          - vf
          - vi
        access: rw
        min: 0
        max: 126
        description: Master valve configuration bitfield (Bit_n=channel needs master)
      watering_timer_1:
        type: vi
        access: rw
        unit: s
        min: -36000
        max: 36000
        description: Watering timer for channel 1
      watering_timer_2:
        type: vi
        access: rw
        unit: s
        min: -36000
        max: 36000
        description: Watering timer for channel 2
      watering_timer_3:
        type: vi
        access: rw
        unit: s
        min: -36000
        max: 36000
        description: Watering timer for channel 3
      watering_timer_4:
        type: vi
        access: rw
        unit: s
        min: -36000
        max: 36000
        description: Watering timer for channel 4
      watering_timer_5:
        type: vi
        access: rw
        unit: s
        min: -36000
        max: 36000
        description: Watering timer for channel 5
      watering_timer_6:
        type: vi
        access: rw
        unit: s
        min: -36000
        max: 36000
        description: Watering timer for channel 6
  lemonbeat_status_message:
    resources:
      code:
        type: vi
        access: r
        description: Status code
      data:
        type: vs
        access: r
        description: Additional status data (4 bytes HEX)
      level:
        type: vi
        access: r
        min: 0
        max: 5
        description: 'Message level: 0=Disabled, 1=Important, 2=Error, 3=Warning, 4=Info, 5=Debug'
      type:
        type: vi
        access: r
        min: 0
        max: 255
        description: Message type
