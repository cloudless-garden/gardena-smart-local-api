name: SILENO city/life (with LONA)
protocol: gen1
commands:
  measure_rf_link: 7
  reboot: 31
  ntp_force_sync: 32
  led_all_off: 33
  led_all_green_on: 34
  led_all_red_on: 35
  emc_test_start: 29
  emc_test_stop: 30
  power_off: 26
  factory_reset_start_inclusion_mode: 43
  wipe_map: 44
  wipe_zones: 45
  deactivate_map: 46
  deactivate_zones: 47
  board_reset: 48
  wipe_map_and_zones: 49
  trigger_guide_wire_length_measurement: 51
  force_report: 50
objects:
  connection_status:
    object_id: 28171
    object_urn: urn:oma:lwm2m:ext:28171
    object_version: '0.2'
    mandatory: true
    resources:
      online:
        type: vb
        access: r
        description: Indicates if the device is online (true) or offline (false)
  data_download:
    resources:
      checksum:
        type: vi
        access: r
      content_tag:
        type: vi
        access: r
      slot:
        type: vi
        access: r
      status:
        type: vi
        access: r
  device:
    object_id: 3
    object_urn: urn:oma:lwm2m:oma:3
    object_version: '1.1'
    mandatory: true
    resources:
      device_type:
        type: vs
        access: r
        description: Type of the device
      error_code:
        type: ai
        access: r
        description: Current error code(s)
      firmware_version:
        type: vs
        access: r
        description: Current firmware version
      hardware_version:
        type: vs
        access: r
        description: Hardware version
      manufacturer:
        type: vs
        access: r
        description: Manufacturer name
      model_number:
        type: vs
        access: r
        description: Model number or identifier
      serial_number:
        type: vs
        access: r
        description: Serial number
      software_version:
        type: vs
        access: r
        description: Current software version
      supported_binding_and_modes:
        type: vs
        access: r
        description: Supported bindings and modes
      utc_offset:
        type: vs
        access: rw
        description: UTC offset currently in effect for device
  firmware_update:
    object_id: 5
    object_urn: urn:oma:lwm2m:oma:5
    object_version: '1.1'
    mandatory: true
    resources:
      firmware_update_delivery_method:
        type: vi
        access: r
        description: Firmware update delivery method
      package_uri:
        type: vs
        access: rw
        description: URI from where the device can download the firmware package
      pkg_version:
        type: vs
        access: r
        description: Package version
      state:
        type: vi
        access: r
        min: 0
        max: 3
        description: 'Firmware update state: 0=Idle, 1=Downloading, 2=Downloaded, 3=Updating'
      update_result:
        type: vi
        access: r
        min: 0
        max: 9
        description: 'Update result: 0=Initial, 1=Success, 2=Not enough storage, 3=Out of memory, 4=Connection lost, 5=CRC check failure, 6=Unsupported package type, 7=Invalid URI, 8=Update failed, 9=Unsupported protocol'
  lemonbeat:
    resources:
      action_paused_until_1:
        type: vo
        access: rw
        persistent: true
        report_on_update: true
        description: 'Timestamp until the schedule is paused (Format: YYYYMMDDHHmm, local time)'
      battery_level:
        type: vi
        access: r
        unit: '%'
        min: 0
        max: 100
        report_on_update: true
        description: Battery level (100% is full)
      charging_cycles:
        type: vi
        access: r
        min: 0
        max: 65535
        report_on_update: true
        description: Number of completed charging cycles
      collisions:
        type: vi
        access: r
        min: 0
        max: 65535
        report_on_update: true
        description: Total number of collisions
      command:
        type: vi
        access: rw
        report_on_update: true
        description: Command to execute
      cutting_time:
        type: vi
        access: r
        min: 0
        max: 65535
        report_on_update: true
        description: Time in hours that the cutting disc has been active
      data_download:
        type: vo
        access: r
      data_download_int:
        type: vo
        access: rw
      device_type:
        type: vs
        access: r
        report_on_update: true
        description: Device type identifier
      device_variant:
        type: vs
        access: r
        report_on_update: true
        description: Device variant identifier
      guide_wire_length:
        type: vi
        access: r
        unit: m
        min: 0
        max: 1000
        uninitialized: '0'
        report_on_update: true
        description: Guide wire length in meters
      internal_connection_state:
        type: vi
        access: r
      last_error_code:
        type: vi
        access: r
        min: 0
        max: 65535
        report_on_update: true
        description: Last reported error code from the mower
      lona:
        type: vo
        access: r
      lona_control:
        type:
          - vi
          - vo
        access: rw
        persistent: true
        encoding: hex
        uninitialized: empty
        report_on_update: true
        description: LONA control flags (8 bytes, bit flags for LONA features)
      lona_mcu_boot_fw_version:
        type: vo
        access: r
      lona_mcu_fw_version:
        type: vo
        access: r
      lona_status:
        type: vo
        access: r
        encoding: hex
        report_on_update: true
        description: LONA status (12 bytes, includes error code, zone tag, map tag, session ID)
      mainboard_version:
        type: vs
        access: r
        report_on_update: true
        description: 'Mainboard version (format: XX.XX)'
      manual_operation:
        type: vi
        access: r
        report_on_update: true
        description: Manual mode status (requires physical access)
      mmi_version:
        type: vs
        access: r
        report_on_update: true
        description: 'MMI application version (format: XX.XX)'
      mower_timer_with_distance:
        type: vo
        access: rw
      position:
        type: vo
        access: r
        encoding: hex
        uninitialized: empty
        report_on_update: true
        description: GNSS position and compass data (26 bytes, includes lat/lon, accuracy, heading)
      position_timer:
        type: vi
        access: rw
        unit: s
        min: 0
        max: 3600
        report_on_update: true
        description: Duration for repeated position reporting (write >0 to start, 0 to stop)
      position_update_interval:
        type: vi
        access: rw
        unit: ms
        min: 1
        max: 3600000
        persistent: true
        report_on_update: true
        description: Time interval for position reporting
      rf_link_quality:
        type: vi
        access: r
        unit: '%'
        min: 0
        max: 100
        report_on_update: true
        description: RF link quality percentage
      running_time:
        type: vi
        access: r
        min: 0
        max: 65535
        report_on_update: true
        description: Time in hours that the wheel motors have been active
      schedule_config:
        type: vo
        access: rw
        persistent: true
        report_on_update: true
        description: Schedule configuration (up to 14 schedules, 7 bytes each)
      serial_number:
        type: vs
        access: r
        report_on_update: true
        description: Mower serial number
      settings_control:
        type: vo
        access: rw
        persistent: true
        encoding: hex
        report_on_update: true
        description: Write settings (hex encoded custom buffer)
      settings_report:
        type: vo
        access: r
        encoding: hex
        report_on_update: true
        description: Read settings (hex encoded custom buffer)
      source_for_next_start:
        type: vi
        access: r
        report_on_update: true
        description: Source/reason for timestamp_next_start (no_source, daily_limit, week_timer, countdown, charging, auto_timer, frost)
      start_delay_ms:
        type: vi
        access: rw
      starting_points:
        type: vo
        access: rw
        report_on_update: true
        description: Parameters for three starting points in mower binary format
      status:
        type: vi
        access: r
        report_on_update: true
        description: Mower status (off, wait_for_safety, pause, running_mowing_timer, mowing, learning_wire, going_home, charging, error, software_update, wait_leaving_cs, leaving_cs, wait_for_new_task, startup)
      supported_starting_points:
        type: vi
        access: r
        min: 0
        max: 3
        report_on_update: true
        description: Number of supported starting points
      supported_wires:
        type: vi
        access: r
        min: 0
        max: 255
        report_on_update: true
        description: Bit mask for supported wire features
      timestamp_last_error_code:
        type: vo
        access: r
        report_on_update: true
        description: Timestamp of last error code (seconds since 1970-01-01, local time)
      timestamp_next_start:
        type: vo
        access: r
        report_on_update: true
        description: Estimated time of next automatic start (seconds since 1970-01-01, local time, 0=start now)
  lemonbeat_status_message:
    object_id: 28173
    object_urn: urn:oma:lwm2m:ext:28173
    object_version: '0.1'
    mandatory: false
    resources:
      code:
        type: vi
        access: r
        description: Status code
      data:
        type: vs
        access: r
        description: Additional status data (4 bytes HEX)
      level:
        type: vi
        access: r
        min: 0
        max: 5
        description: 'Message level: 0=Disabled, 1=Important, 2=Error, 3=Warning, 4=Info, 5=Debug'
      type:
        type: vi
        access: r
        min: 0
        max: 255
        description: Message type
