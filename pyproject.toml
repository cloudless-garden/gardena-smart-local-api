[project]
name = "gardena-smart-system-local"
version = "0.1.0"
description = "A Python library for interacting with Gardena Smart System IoT devices, providing type-safe device models and easy-to-use interfaces."
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "aiofile>=3.9.0",
    "pydantic>=2.12.5",
    "pyyaml>=6.0",
]

[project.optional-dependencies]
websocket = [
    "aiohttp>=3.13.3",
]

[dependency-groups]
dev = [
    "ruff>=0.14.13",
    "ty>=0.0.12",
]

test = [
    "pytest>=9.0.2",
    "pytest-asyncio>=0.25.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["smart_system_local"]
